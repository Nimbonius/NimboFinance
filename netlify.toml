# ── Netlify configuration ──────────────────────────────────────────────────

[build]
  publish = "."

# ── Redirect old /index to / ──
[[redirects]]
  from = "/index.html"
  to   = "/"
  status = 301

# ── Pretty URLs ──────────────────────────────────────────────────────────
[[redirects]]
  from = "/about"
  to   = "/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to   = "/contact.html"
  status = 200

[[redirects]]
  from = "/privacy-policy"
  to   = "/privacy-policy.html"
  status = 200

[[redirects]]
  from = "/compound-interest"
  to   = "/compound-interest.html"
  status = 200

[[redirects]]
  from = "/loan-payoff"
  to   = "/loan-payoff.html"
  status = 200

[[redirects]]
  from = "/mortgage"
  to   = "/mortgage.html"
  status = 200

[[redirects]]
  from = "/credit-card"
  to   = "/credit-card.html"
  status = 200

# ── Security headers ───────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"
