# ── Netlify configuration ──────────────────────────────────────────────────

[build]
  publish = "."

# ── Redirect /index to / to avoid duplicate pages ──
[[redirects]]
  from = "/index.html"
  to   = "/"
  status = 301

# ── Pretty URLs: /about instead of /about.html ──
[[redirects]]
  from = "/about"
  to   = "/about.html"
  status = 200

[[redirects]]
  from = "/contact"
  to   = "/contact.html"
  status = 200

[[redirects]]
  from = "/privacy-policy"
  to   = "/privacy-policy.html"
  status = 200

# ── Security headers ───────────────────────────────────────────────────────
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "geolocation=(), microphone=(), camera=()"
